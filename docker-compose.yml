version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: traceback_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       lostfound
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d lostfound"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: traceback_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./lostfound-backend
      dockerfile: Dockerfile
    container_name: traceback_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/lostfound
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      REDIS_HOST:                 redis
      REDIS_PORT:                 6379
      JWT_SECRET:                 ${JWT_SECRET:-dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIHRyYWNlYmFjayBhcHBsaWNhdGlvbg==}
      MAIL_USERNAME:              ${MAIL_USERNAME:-dummy}
      MAIL_PASSWORD:              ${MAIL_PASSWORD:-dummy}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./traceback-frontend
    container_name: traceback_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
